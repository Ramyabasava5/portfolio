<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#0f0f1a;color:white}
.header{background:linear-gradient(135deg,#000,#ff7ebc);padding:20px;border-radius:12px;color:white}
.card-box{background:#181818;padding:20px;border-radius:12px}
</style>
</head>
<body>
<div class="container mt-5">
<div class="header text-center">
<h1>Portfolio Admin Dashboard</h1>
<p>Ramya Basava Portfolio Messages</p>
</div>
<div class="card-box mt-3">
<h3>Total Messages : {{ contacts|length }}</h3>
<div class="table-responsive">
<table class="table table-dark table-bordered">
<thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Date</th><th>Action</th></tr></thead>
<tbody>
{% for contact in contacts %}
<tr>
<td>{{ contact[0] }}</td><td>{{ contact[1] }}</td><td>{{ contact[2] }}</td>
<td>{{ contact[3] }}</td><td>{{ contact[4] }}</td><td>{{ contact[5] }}</td>
<td><a href="/delete/{{ contact[0] }}" class="btn btn-danger btn-sm">Delete</a></td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
</div>
</div>
</body></html>
